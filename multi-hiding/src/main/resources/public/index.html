<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Community Hiding</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <h1>Community Hiding Visualization</h1>
    <div id="controls">
        <label for="dataset">Choose a dataset:</label>
        <select id="dataset" name="dataset">
            <option value="karate">Karate Club</option>
            <option value="football">Football</option>
            <option value="dolphin">Dolphins</option>
            <option value="lesmis">Les Miserables</option>
        </select>
        <button id="load-graph">Load Graph</button>
    </div>
    <div id="graph-container"></div>
    <div id="community-selection">
        <h2>Select Communities to Hide</h2>
        <div id="community-list"></div>
        <label for="budget">Budget:</label>
        <input type="number" id="budget" name="budget" value="10">
        <button id="hide-communities">Hide Selected Communities</button>
    </div>

    <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/graph.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
